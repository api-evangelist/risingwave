---
aid: risingwave
name: RisingWave
description: >-
  RisingWave is a distributed SQL streaming platform that continuously ingests
  event streams from Kafka, Kinesis, and other sources, transforms them using
  PostgreSQL-compatible SQL, and serves low-latency results through incrementally
  maintained materialized views. It delivers sub-100ms freshness for operational
  workloads and supports streaming analytics via Apache Iceberg integration with
  exactly-once semantics. The platform offers a decoupled compute and storage
  architecture for cost efficiency, with transparent dynamic scaling and instant
  failure recovery. RisingWave is available as open-source (Apache 2.0), as a
  managed cloud service (RisingWave Cloud) on AWS, GCP, and Azure, and as a
  self-managed deployment on Kubernetes.
